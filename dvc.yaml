stages:
  preprocess:
    cmd: python src/preprocess.py
    deps:
      - src/preprocess.py
      - data/raw/technopark.csv
      - data/raw/thampanoor.csv
      - params.yaml
    outs:
      - data/processed/
    params:
      - window_size
      - horizon
  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/processed/
      - params.yaml
    outs: []
    metrics:
      - metrics.json:
          cache: false
    plots:
      - version.json:
          cache: false